name: Supabase Keep-Alive

on:
  schedule:
    # Roda às 00:00 UTC (21:00 Horário de Brasília) toda Segunda e Sexta
    - cron: '0 0 * * 1,5'
  workflow_dispatch: # Permite rodar manualmente para testar

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/staff?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
